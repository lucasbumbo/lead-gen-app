<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎬 VideoLead Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <header>
      <h1>🎬 VideoLead Finder</h1>
      <p class="subtitle">Find local businesses that need your video services — in the USA and Brazilian communities</p>
    </header>

    <!-- Market selector -->
    <div class="market-tabs">
      <button class="market-tab active" data-market="us">🇺🇸 US Market</button>
      <button class="market-tab" data-market="brazil">🇧🇷 Brazilian Community</button>
    </div>

    <!-- US Market Form -->
    <form id="form-us" class="search-form active-form">
      <div class="form-group">
        <input type="text" id="us-niche" placeholder="Niche (e.g. barbershop, dentist, gym)" required />
        <input type="text" id="us-city"  placeholder="City (e.g. Miami, FL)" required />
        <button type="submit" class="btn-search">Search 🔍</button>
      </div>
    </form>

    <!-- Brazilian Community Form -->
    <form id="form-brazil" class="search-form" style="display:none">
      <div class="form-group">
        <input type="text" id="br-niche"
          placeholder="Nicho (ex: restaurante brasileiro)"
          list="br-niche-list" required />
        <datalist id="br-niche-list">
          <option value="restaurante brasileiro">
          <option value="salão de beleza">
          <option value="barbearia brasileira">
          <option value="limpeza residencial">
          <option value="construção e reforma">
          <option value="paisagismo">
          <option value="padaria brasileira">
          <option value="açougue brasileiro">
          <option value="mercado brasileiro">
          <option value="academia brasileira">
          <option value="igreja evangélica">
          <option value="escola de português">
          <option value="buffet brasileiro">
          <option value="advogado brasileiro">
          <option value="clínica brasileira">
        </datalist>
        <select id="br-city" required>
          <option value="">Selecione a cidade…</option>
          <optgroup label="🗺️ New England (comunidade brasileira)">
            <option value="Framingham, MA">Framingham, MA — 🇧🇷 Pequeno Brasil</option>
            <option value="Marlborough, MA">Marlborough, MA</option>
            <option value="Hudson, MA">Hudson, MA</option>
            <option value="Somerville, MA">Somerville, MA</option>
            <option value="Everett, MA">Everett, MA</option>
            <option value="Malden, MA">Malden, MA</option>
            <option value="Fall River, MA">Fall River, MA</option>
            <option value="Boston, MA">Boston, MA</option>
            <option value="Providence, RI">Providence, RI</option>
          </optgroup>
          <optgroup label="🌎 Outros estados">
            <option value="Miami, FL">Miami, FL</option>
            <option value="Orlando, FL">Orlando, FL</option>
            <option value="Newark, NJ">Newark, NJ</option>
            <option value="Pompano Beach, FL">Pompano Beach, FL</option>
            <option value="Boca Raton, FL">Boca Raton, FL</option>
            <option value="New York, NY">New York, NY</option>
            <option value="Houston, TX">Houston, TX</option>
            <option value="Los Angeles, CA">Los Angeles, CA</option>
          </optgroup>
        </select>
        <button type="submit" class="btn-search btn-brazil">Buscar 🔍</button>
      </div>
    </form>

    <div id="status"></div>

    <!-- Result area -->
    <div id="tabs-wrapper" class="hidden">
      <div class="tabs">
        <button class="tab-btn active" data-tab="results">📋 Results</button>
        <button class="tab-btn" data-tab="outreach">✉️ Outreach</button>
        <button class="tab-btn" data-tab="history">🕓 History</button>
      </div>

      <!-- Results -->
      <div id="tab-results" class="tab-content active">
        <div class="tab-header">
          <span id="results-title"></span>
          <button id="export-btn">⬇️ Export CSV</button>
        </div>

        <!-- Filter bar -->
        <div class="filter-bar">
          <label class="filter-item">
            <input type="checkbox" id="filter-pt"> 🇧🇷 Só PT
          </label>
          <select id="filter-source" class="filter-select">
            <option value="all">Todas as fontes</option>
            <option value="google">Google</option>
            <option value="foursquare">Foursquare</option>
          </select>
        </div>

        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th></th>
                <th data-sort="name" class="sortable">Business Name ↕</th>
                <th>Phone</th>
                <th>Website</th>
                <th>Instagram</th>
                <th data-sort="rating" class="sortable">Rating ↕</th>
                <th data-sort="reviewCount" class="sortable">Reviews ↕</th>
                <th data-sort="score" class="sortable">Score ↕</th>
                <th>Source</th>
                <th>🇧🇷 PT?</th>
              </tr>
            </thead>
            <tbody id="results-body"></tbody>
          </table>
        </div>
      </div>

      <!-- Outreach -->
      <div id="tab-outreach" class="tab-content">
        <p class="tab-hint">Click any message to copy it to your clipboard.</p>
        <div id="outreach-list"></div>
      </div>

      <!-- History -->
      <div id="tab-history" class="tab-content">
        <div id="history-list"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
